services:
  # ----------------------------
  # OpenHands (Jarvis workbench lane)
  # ----------------------------
  openhands:
    build:
      context: ..
      dockerfile: compose/openhands_override/Dockerfile
    image: oh-shop/openhands:1.5.0-runtime-patched
    container_name: openhands-app
    command: ["uvicorn", "openhands.server.listen:app", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "127.0.0.1:3000:3000"
      - "${DOCKER_BRIDGE_GATEWAY:-172.17.0.1}:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OH_PERSISTENCE_DIR=/.openhands
      - LOG_ALL_EVENTS=true
      - WORKSPACE_MOUNT_PATH=/opt/workspace_base
      - AGENT_SERVER_IMAGE_REPOSITORY=oh-shop/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.11.4-runtime-patched
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/data/openhands:/.openhands
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/services/openhands:/workspace/services/openhands
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/roles/jarvis:/workspace/roles/jarvis
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/projects:/opt/workspace_base/projects
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/jobs:/opt/workspace_base/jobs
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/shared:/opt/workspace_base/shared
    stdin_open: true
    tty: true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3000/', timeout=3); raise SystemExit(0 if r.status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - garage-internal

  # ----------------------------
  # chat-guard (kept provisional)
  # ----------------------------
  chat-guard:
    image: python:3.11-alpine
    container_name: openhands-chat-guard
    command:
      [
        "sh",
        "-lc",
        "python3 -c 'import docker' >/dev/null 2>&1 || pip install --no-cache-dir docker >/dev/null && python3 -u /opt/oh_shop/ops/manual/chat_guard.py --db /.openhands/openhands.db --watch --interval 60 --openhands-url http://openhands:3000",
      ]
    volumes:
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/data/openhands:/.openhands
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/ops:/opt/oh_shop/ops:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      openhands:
        condition: service_started
    restart: unless-stopped
    networks:
      - garage-internal

  # ----------------------------
  # OpenWebUI (front door)
  # ----------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main@sha256:bb3f0281554bf05a9d505ffb5a5f067ab53e13ac772eb4ea3077a92ddc64600e
    container_name: open-webui
    ports:
      - "127.0.0.1:3001:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_BASE_URLS=http://host.docker.internal:1234/v1
      - OPENAI_API_KEYS=lm-studio
      - ENABLE_OPENAI_API=true
      - OLLAMA_BASE_URLS=
    volumes:
      - openwebui_data:/app/backend/data
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/services/openwebui:/workspace/services/openwebui
    restart: unless-stopped
    networks:
      - garage-internal

  # ----------------------------
  # stagehand-mcp (Robin browser lane)
  # ----------------------------
  stagehand-mcp:
    build:
      context: "../vendor/stagehand_mcp"
      dockerfile: Dockerfile
    image: oh-stagehand-mcp:0.3.0-runtime-patched
    container_name: stagehand-mcp
    ports:
      - "127.0.0.1:3020:3020"
      - "${DOCKER_BRIDGE_GATEWAY:-172.17.0.1}:3020:3020"
    environment:
      - STAGEHAND_MODEL=${STAGEHAND_MODEL:-}
      - STAGEHAND_LLM_BASE_URL=http://host.docker.internal:1234/v1
      - STAGEHAND_LLM_API_KEY=lm-studio
      - CHROME_PATH=/usr/bin/chromium
      - HEADLESS=true
      - BROWSER_WIDTH=1920
      - BROWSER_HEIGHT=1080
      - DEVTOOLS=false
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3020
      - EXPERIMENTAL=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/services/stagehand:/workspace/services/stagehand
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/roles/robin:/workspace/roles/robin
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/shared/download_staging:/data/downloads
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/shared/evidence_staging:/workspace/shared/evidence_staging
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/shared/handoff_staging:/workspace/shared/handoff_staging
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3020/healthz').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - garage-internal

  # ----------------------------
  # Alfred (deterministic controller / official clerk)
  # ----------------------------
  alfred:
    build:
      context: ..
      dockerfile: compose/alfred/Dockerfile
    image: oh-shop/alfred:0.1.0
    container_name: garage-alfred
    environment:
      - GARAGE_WORKSPACE_ROOT=/workspace
    volumes:
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/services/alfred:/workspace/services/alfred
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/roles/alfred:/workspace/roles/alfred
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/ledger:/workspace/ledger
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/projects:/workspace/projects:ro
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/jobs:/workspace/jobs:ro
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/shared:/workspace/shared
    depends_on:
      ledger:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3031/healthz', timeout=3); raise SystemExit(0 if r.status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - garage-internal

  # ----------------------------
  # Ledger (durable record / query plane)
  # ----------------------------
  ledger:
    build:
      context: ..
      dockerfile: compose/ledger/Dockerfile
    image: oh-shop/ledger:0.1.0
    container_name: garage-ledger
    environment:
      - GARAGE_WORKSPACE_ROOT=/workspace
    volumes:
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/ledger:/workspace/ledger
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3032/healthz', timeout=3); raise SystemExit(0 if r.status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - garage-internal

  # ----------------------------
  # Transfer (PO-box broker)
  # ----------------------------
  transfer:
    build:
      context: ..
      dockerfile: compose/transfer/Dockerfile
    image: oh-shop/transfer:0.1.0
    container_name: garage-transfer
    environment:
      - GARAGE_WORKSPACE_ROOT=/workspace
    volumes:
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/pobox:/workspace/pobox
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/ledger/imports:/workspace/ledger/imports
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/ledger/exports:/workspace/ledger/exports
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/projects:/workspace/projects:ro
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/jobs:/workspace/jobs:ro
      - ${OH_SHOP_ROOT:-/home/dev/OH_SHOP}/workspace/shared:/workspace/shared
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3033/healthz', timeout=3); raise SystemExit(0 if r.status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - garage-internal

volumes:
  openwebui_data:

networks:
  garage-internal:
    driver: bridge
