services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:latest
    container_name: openhands-app
    ports:
      - "127.0.0.1:3000:3000"
      - "${DOCKER_BRIDGE_GATEWAY:-172.17.0.1}:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OH_PERSISTENCE_DIR=/.openhands
      - LOG_ALL_EVENTS=true
      - WORKSPACE_MOUNT_PATH=/opt/workspace_base
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/dev/OH_SHOP/data/openhands:/.openhands
      - /home/dev/OH_SHOP/repos:/opt/workspace_base
    stdin_open: true
    tty: true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3000/', timeout=3); raise SystemExit(0 if r.status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  chat-guard:
    image: python:3.11-alpine
    container_name: openhands-chat-guard
    command:
      [
        "python3",
        "-u",
        "/opt/oh_shop/scripts/chat_guard.py",
        "--db",
        "/.openhands/openhands.db",
        "--watch",
        "--interval",
        "60",
      ]
    volumes:
      - /home/dev/OH_SHOP/data/openhands:/.openhands
      - /home/dev/OH_SHOP/scripts:/opt/oh_shop/scripts:ro
    depends_on:
      openhands:
        condition: service_started
    restart: unless-stopped
